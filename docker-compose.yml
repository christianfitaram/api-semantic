services:
  api:
    build: .
    image: api-semantic:latest
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - api_semantic_models:/app/models
    command: [
      "uvicorn",
      "api_semantic.main:app",
      "--host",
      "0.0.0.0",
      "--port",
      "8000",
      "--workers",
      "1"
    ]

  bootstrap:
    build: .
    image: api-semantic:latest
    env_file:
      - .env
    volumes:
      - api_semantic_models:/app/models
    command: ["python", "-m", "api_semantic.bootstrap"]

volumes:
  api_semantic_models:
